# Release automation:
# 1. release-please watches main, opens/updates a release PR from Conventional
#    Commits, and — when that PR is merged — creates the version tag and the
#    GitHub Release.
# 2. The build matrix then packages the macOS app (Apple Silicon + Intel)
#    and attaches the installers to that release. macOS only for now.
# Both live in one workflow because releases created with the default
# GITHUB_TOKEN do not trigger other workflows.
# The workflow_dispatch trigger rebuilds and re-attaches the installers for an
# existing release tag (e.g. after a runner or packaging fix).
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build installers for"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build:
    needs: release-please
    if: ${{ !cancelled() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon
            args: --mac
          - os: macos-15-intel # Intel (last x64 image, available until Aug 2027)
            args: --mac
    runs-on: ${{ matrix.os }}
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      # Node 24 here decides which system Node the packaged app supports:
      # native modules (better-sqlite3) ship prebuilt for this Node major.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build

      - name: Package with electron-builder
        run: npx electron-builder ${{ matrix.args }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Attach installers to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: release/*.dmg
